---
configure_dotfiles: true
configure_terminal: true
configure_osx: true

# Set to 'true' to configure the Dock via dockutil.
configure_dock: true
dockitems_remove:
  - Launchpad
  - 'App Store'
  - 'iPhone Mirroring'
dockitems_persist:
  - name: "Mission Control"
    path: "/System/Applications/Mission Control.app/"
    pos: 1
  - name: "Safari"
    path: "/System/Volumes/Preboot/Cryptexes/App/System/Applications/Safari.app/"
    pos: 2
  - name: "Messages"
    path: "/System/Applications/Messages.app/"
    pos: 3
  - name: "Google Chrome"
    path: "/Applications/Google Chrome.app/"
    pos: 4
  - name: "System Settings"
    path: "/System/Applications/System Settings.app/"
    pos: 5
  - name: "Google Chat"
    path: "/Users/dazzathewiz/Applications/Chrome Apps.localized/Google Chat.app/"
    pos: 6

configure_sudoers: false
sudoers_custom_config: ""
# Example:
# sudoers_custom_config: |
#   # Allow users in admin group to use sudo with no password.
#   %admin ALL=(ALL) NOPASSWD: ALL

dotfiles_repo: https://github.com/dazzathewiz/dotfiles.git
dotfiles_repo_accept_hostkey: true
dotfiles_repo_local_destination: ~/code/dotfiles
dotfiles_repo_version: master # Replace with your default branch
dotfiles_files:
  - .zshrc
  - .gitconfig
  - .profile
  - .config/starship.toml
  - .osx

homebrew_installed_packages:
  - age
  - ansible
  - balena-cli
  - flux
  - gh
  - git
  - helm
  - kubernetes-cli
  - mas
  - sops
  - sshpass
  - starship
  - telnet
  - unar

homebrew_taps:
  - datreeio/datree
  - fluxcd/tap
  - hudochenkov/sshpass

homebrew_cask_appdir: /Applications
homebrew_cask_apps:
  - 1password
  - 1password-cli
  - adobe-acrobat-reader
  - balenaetcher
  - citrix-workspace
  - discord
  - dropbox
  - google-chrome
  - home-assistant
  - lens
  - logitech-g-hub
  - macfuse
  - microsoft-office
  - mos
  - mqtt-explorer
  - plex
  - slack
  - spotify
  - visual-studio-code
  - vlc
  - webex-meetings
  - zoom

# See `geerlingguy.mas` role documentation for usage instructions.
mas_installed_apps: []


mas_email: ""
mas_password: ""

osx_script: "~/.osx --no-restart"

# Install packages from other package managers.
# Note: You are responsible for making sure the required package managers are
# installed, eg. through homebrew.
composer_packages: []
# - name: drush
#   state: present # present/absent, default: present
#   version: "^8.1" # default: N/A
gem_packages: []
# - name: bundler
#   state: present # present/absent/latest, default: present
#   version: "~> 1.15.1" # default: N/A
npm_packages: []
# - name: webpack
#   state: present # present/absent/latest, default: present
#   version: "^2.6" # default: N/A
pip_packages:
  - "xkcdpass"
  
# - name: mkdocs
#   state: present # present/absent/latest, default: present
#   version: "0.16.3" # default: N/A

# Set to 'true' to configure Sublime Text.
configure_sublime: false
sublime_base_path: "~/Library/Application Support/Sublime Text"
sublime_config_path: "Packages/User"
sublime_package_control:
  - "DocBlockr"
  - "Dockerfile Syntax Highlighting"
  - "FileDiffs"
  - "GitHub Flavored Markdown Preview"
  - "Jinja2"
  - "Package Control"
  - "Pretty JSON"
  - "SublimeLinter"
  - "SublimeLinter-contrib-yamllint"
  - "Theme - Cobalt2"
  - "TrailingSpaces"
  - "WordingStatus"

# Glob pattern to ansible task files to run after all other tasks are finished.
post_provision_tasks: []
